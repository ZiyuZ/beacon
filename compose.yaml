services:
  app:
    build: .
    container_name: beacon
    restart: always
    ports:
      - "44395:8000"
    environment:
      TZ: ${TZ:-UTC}
      BEACON_API_TOKEN: ${BEACON_API_TOKEN:?set BEACON_API_TOKEN in .env}
      BEACON_ADMIN_PASSWORD: ${BEACON_ADMIN_PASSWORD:?set BEACON_ADMIN_PASSWORD in .env}
      BEACON_SQLITE_PATH: /app/data/beacon.db
      BEACON_RUNNING_WINDOW_S: ${BEACON_RUNNING_WINDOW_S:-1800}
    volumes:
      - ./data:/app/data
