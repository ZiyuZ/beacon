{% extends "base.html" %}

{% block title %}Tasks · Beacon{% endblock %}

{% block header_right %}
<button type="button"
  class="rounded-md border border-red-900/50 bg-red-950/30 px-2 py-1 text-[11px] font-medium text-red-300 transition hover:bg-red-950/50"
  onclick="beaconDeleteFinishedTasks();" title="Delete all logs for finished tasks">Clear finished</button>
<span class="text-[11px] text-slate-500">refreshes every 2s</span>
{% endblock %}

{% block content %}
<div class="flex shrink-0 flex-wrap items-center gap-2 mb-3">
  <div class="relative min-w-0 flex-1">
    <input id="task-search" type="text" placeholder="Search tasks..."
      class="w-full rounded-md border border-slate-700 bg-slate-800/40 px-2 py-1 pr-7 text-xs text-slate-100 placeholder:text-slate-500 focus:border-slate-500 focus:outline-none"
      autocomplete="off" spellcheck="false" />
    <button id="search-clear" type="button"
      class="absolute right-1.5 top-1/2 -translate-y-1/2 hidden rounded p-0.5 text-slate-500 hover:text-slate-300 transition"
      aria-label="Clear search">✕</button>
  </div>
</div>
<ul id="task-list" class="divide-y divide-slate-800 overflow-hidden rounded-xl border border-slate-800 bg-slate-900/40"
  hx-get="/partials/tasks" hx-trigger="load, every 2s" hx-swap="innerHTML">
  {% include "partials/task_list.html" %}
</ul>
<script>
  (function () {
    var search = document.getElementById("task-search");
    var clearBtn = document.getElementById("search-clear");
    if (!search) return;
    var list = document.getElementById("task-list");

    function applyTaskSearch() {
      var q = search.value;
      if (clearBtn) {
        clearBtn.classList.toggle("hidden", !q);
      }
      list.querySelectorAll("[data-task-name]").forEach(function (li) {
        var name = li.getAttribute("data-task-name").toLowerCase();
        li.classList.toggle("search-hidden", q && !name.includes(q.toLowerCase()));
      });
    }

    search.addEventListener("input", applyTaskSearch);

    if (clearBtn) {
      clearBtn.addEventListener("click", function () {
        search.value = "";
        applyTaskSearch();
        search.focus();
      });
    }

    list.addEventListener("htmx:afterSwap", function () {
      if (search.value) applyTaskSearch();
    });
  })();
</script>
{% endblock %}
