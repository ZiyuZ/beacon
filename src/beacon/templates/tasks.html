{% extends "base.html" %}

{% block title %}Tasks · Beacon{% endblock %}

{% block header_right %}
  <button
    type="button"
    class="rounded-md border border-red-900/50 bg-red-950/30 px-2 py-1 text-[11px] font-medium text-red-300 transition hover:bg-red-950/50"
    onclick="beaconDeleteInactiveTasks();"
    title="Delete all logs for inactive tasks"
  >Clear inactive</button>
  <span class="text-[11px] text-slate-500">refreshes every 2s</span>
{% endblock %}

{% block content %}
  <ul
    id="task-list"
    class="divide-y divide-slate-800 overflow-hidden rounded-xl border border-slate-800 bg-slate-900/40"
    hx-get="/partials/tasks"
    hx-trigger="load, every 2s"
    hx-swap="innerHTML"
  >
    {% include "partials/task_list.html" %}
  </ul>
{% endblock %}
