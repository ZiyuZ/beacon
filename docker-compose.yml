services:
  app:
    build: .
    image: beacon
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      BEACON_API_TOKEN: ${BEACON_API_TOKEN:?set BEACON_API_TOKEN in .env}
      BEACON_SQLITE_PATH: /app/data/beacon.db
      BEACON_RUNNING_WINDOW_S: ${BEACON_RUNNING_WINDOW_S:-30}
    volumes:
      - ./data:/app/data
